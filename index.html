<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="/garden_tech_melbourne/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Melbourne's premier specialists in custom garden irrigation and architectural outdoor landscape lighting. Smart, water-saving designs and premium lighting.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Garden Tech Melbourne">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Garden Tech Melbourne</title>
  <link rel="manifest" href="manifest.json">
  
  <style>
    body {
      background-color: #FAF8F5;
      margin: 0;
      padding: 0;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    #loading-indicator {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: #FAF8F5;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 99999;
      opacity: 1;
      transition: opacity 0.5s ease-out;
    }
    .loader-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }
    .brand-logo-img {
      width: 60px;
      height: 60px;
      border-radius: 14px;
      margin-bottom: 20px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      animation: pulse 2s infinite ease-in-out;
    }
    .brand-name {
      margin-bottom: 30px;
    }
    .brand-title {
      font-size: 22px;
      font-weight: 800;
      color: #1E352F;
      letter-spacing: 3px;
      margin-bottom: 4px;
    }
    .brand-subtitle {
      font-size: 11px;
      font-weight: 600;
      color: #6E7874;
      letter-spacing: 4px;
    }
    .spinner-ring {
      width: 48px;
      height: 48px;
      border: 3px solid rgba(30, 53, 47, 0.1);
      border-top-color: #1E352F;
      border-radius: 50%;
      animation: spin 1s infinite linear;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.9; }
      50% { transform: scale(1.08); opacity: 1; }
    }
  </style>
</head>
<body>
  <div id="loading-indicator">
    <div class="loader-content">
      <img src="assets/logo.png" alt="Garden Tech Melbourne Logo" class="brand-logo-img" />
      <div class="brand-name">
        <div class="brand-title">GARDEN TECH</div>
        <div class="brand-subtitle">MELBOURNE</div>
      </div>
      <div class="spinner-ring"></div>
    </div>
  </div>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
